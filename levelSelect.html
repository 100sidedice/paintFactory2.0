<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Paint Factory — Level Select</title>
    <link rel="stylesheet" href="Pages/levelSelect.css">
    <link rel="icon" type="image/x-icon" href="Assets/icon.png">
</head>
<body>
    <canvas id="Draw" width="800" height="600"></canvas>
    <div id="darken"></div>
    <h1>Level Select</h1>
    <button id="backBtn">Back</button>

    <table id="levels" cellpadding="8" cellspacing="0">
        <tbody></tbody>
    </table>

    <script>
        document.getElementById('backBtn').addEventListener('click', function () {
            window.location.href = 'index.html';
        });

        const tbody = document.querySelector('#levels tbody');
        let level = 1;

        // load completed levels from localStorage (array of 1-based numbers)
        let completedLevels = [];
        try {
            completedLevels = JSON.parse(localStorage.getItem('pf_completedLevels') || '[]') || [];
        } catch (e) {
            completedLevels = [];
        }

        // Check for autowin param for testing
        const params = new URLSearchParams(window.location.search);
        if (params.get('autowin') === 'true') {
            completedLevels = [...Array(30).keys()].map(i => i + 1);
            try {
                localStorage.setItem('pf_completedLevels', JSON.stringify(completedLevels));
            } catch (e) {}
        }

        // build main grid (30 levels = 6 rows × 5 cols)
        for (let r = 0; r < 6; r++) {
            const tr = document.createElement('tr');

            for (let c = 0; c < 5; c++) {
                const td = document.createElement('td');
                const btn = document.createElement('button');

                btn.textContent = level;

                btn.addEventListener('click', (function (n) {
                    return function () {
                        try { localStorage.setItem('pf_selectedLevel', 'level' + n); } catch (e) {}
                        window.location.href = 'game.html';
                    };
                })(level));

                // mark completed levels
                try {
                    if (Array.isArray(completedLevels) && completedLevels.includes(level)) {
                        btn.classList.add('completed');
                    }
                } catch (e) {}

                // check whether level file exists
                (function (b, n) {
                    const url = `Data/Levels/Level${n}.json`;
                    fetch(url, { method: 'GET', cache: 'no-store' }).then(r => {
                        if (!r.ok) {
                            b.classList.add('missing');
                            b.disabled = true;
                            b.setAttribute('aria-disabled', 'true');
                        }
                    }).catch(() => {
                        b.classList.add('missing');
                        b.disabled = true;
                        b.setAttribute('aria-disabled', 'true');
                    });
                })(btn, level);

                // (duplicate listener kept as in your original code)
                btn.addEventListener('click', (function (n) {
                    return function () {
                        try { localStorage.setItem('pf_selectedLevel', 'level' + n); } catch (e) {}
                        window.location.href = 'game.html';
                    };
                })(level));

                td.appendChild(btn);
                tr.appendChild(td);
                level++;
            }

            tbody.appendChild(tr);
        }

        // Check if all 30 levels are completed, if so apply rainbow colors to buttons
        if (Array.isArray(completedLevels)) {
            const allCompleted = completedLevels.length >= 30 && 
                                 [...Array(30).keys()].every(i => completedLevels.includes(i + 1));
            if (allCompleted) {
                // Generate rainbow colors via HSL interpolation (red to purple)
                const generateRainbowColor = (index, total) => {
                    // Interpolate hue from 0 (red) to 280 (purple) across 30 levels
                    const hue = Math.round((index / total) * 280);
                    const saturation = 50; // Keep saturation moderate for muted tone
                    const lightness = 35; // Darker to match sea green tone
                    
                    // Convert HSL to RGB
                    const c = ((1 - Math.abs(2 * lightness / 100 - 1)) * saturation / 100);
                    const x = c * (1 - Math.abs(((hue / 60) % 2) - 1));
                    const m = lightness / 100 - c / 2;
                    
                    let r, g, b;
                    if (hue >= 0 && hue < 60) [r, g, b] = [c, x, 0];
                    else if (hue >= 60 && hue < 120) [r, g, b] = [x, c, 0];
                    else if (hue >= 120 && hue < 180) [r, g, b] = [0, c, x];
                    else if (hue >= 180 && hue < 240) [r, g, b] = [0, x, c];
                    else if (hue >= 240 && hue < 300) [r, g, b] = [x, 0, c];
                    else [r, g, b] = [c, 0, x];
                    
                    const toHex = (v) => Math.round((v + m) * 255).toString(16).padStart(2, '0');
                    const bgColor = `#${toHex(r)}${toHex(g)}${toHex(b)}`;
                    
                    // Border is darker (reduce lightness by ~15)
                    const borderLight = Math.max(0, lightness - 15);
                    const bc = ((1 - Math.abs(2 * borderLight / 100 - 1)) * saturation / 100);
                    const bx = bc * (1 - Math.abs(((hue / 60) % 2) - 1));
                    const bm = borderLight / 100 - bc / 2;
                    let br, bg, bb;
                    if (hue >= 0 && hue < 60) [br, bg, bb] = [bc, bx, 0];
                    else if (hue >= 60 && hue < 120) [br, bg, bb] = [bx, bc, 0];
                    else if (hue >= 120 && hue < 180) [br, bg, bb] = [0, bc, bx];
                    else if (hue >= 180 && hue < 240) [br, bg, bb] = [0, bx, bc];
                    else if (hue >= 240 && hue < 300) [br, bg, bb] = [bx, 0, bc];
                    else [br, bg, bb] = [bc, 0, bx];
                    
                    const borderColor = `#${toHex(br + bm)}${toHex(bg + bm)}${toHex(bb + bm)}`;
                    
                    return { bgColor, borderColor };
                };
                
                document.querySelectorAll('#levels button.completed').forEach((btn, index) => {
                    const colors = generateRainbowColor(index, 30);
                    btn.style.backgroundColor = colors.bgColor;
                    btn.style.borderColor = colors.borderColor;
                });
            }
        }
    </script>

    <script src="Pages/levelSelect.js" type="module"></script>
</body>
</html>
