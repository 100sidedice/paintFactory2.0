<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Paint Factory — Level Select</title>
</head>
<body>
    <h1>Level Select</h1>
    <button id="backBtn">Back</button>

    <table id="levels" cellpadding="8" cellspacing="0">
        <tbody></tbody>
    </table>

    <script>
        document.getElementById('backBtn').addEventListener('click', function () {
            window.location.href = 'index.html';
        });

        const tbody = document.querySelector('#levels tbody');
        let level = 1;
        // Create 6 rows and 5 columns = 30 levels
        for (let r = 0; r < 6; r++) {
            const tr = document.createElement('tr');
            for (let c = 0; c < 5; c++) {
                const td = document.createElement('td');
                const btn = document.createElement('button');
                btn.textContent = level;
                btn.addEventListener('click', (function (n) {
                return function () {
                    window.location.href = 'game.html?level=' + n;
                };
                })(level));
                td.appendChild(btn);
                tr.appendChild(td);
                level++;
            }
            tbody.appendChild(tr);
        }
    </script>
</body>
</html>
