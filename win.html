<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paint Factory — Win</title>
</head>
<body>
  <h1>You Win!</h1>
  <button id="prevBtn">Prev</button>
  <button id="retryBtn">Retry</button>
  <button id="nextBtn">Next</button>
  <button id="levelSelectBtn">Level Select</button>

  <script>
    // Parse the `level` query param. Supports numeric values (e.g. `2`) and keys like `level2`.
    function parseLevelParam() {
      const params = new URLSearchParams(location.search);
      const raw = params.get('level');
      if (raw === null) return { raw: null, num: null };
      const n = parseInt(raw, 10);
      if (!Number.isNaN(n) && String(n) === raw) return { raw: String(n), num: n };
      const m = raw.match(/^level(\d+)$/i);
      if (m) return { raw: raw, num: parseInt(m[1], 10) };
      return { raw: raw, num: null };
    }

    const lp = parseLevelParam();

    document.getElementById('levelSelectBtn').addEventListener('click', function () {
      location.href = 'levelSelect.html';
    });

    document.getElementById('retryBtn').addEventListener('click', function () {
      if (lp.raw) location.href = 'game.html?level=' + lp.raw; else location.href = 'game.html';
    });

    document.getElementById('nextBtn').addEventListener('click', function () {
      if (lp.num) location.href = 'game.html?level=' + (lp.num + 1);
      else if (lp.raw) location.href = 'game.html?level=' + lp.raw;
      else location.href = 'game.html';
    });

    document.getElementById('prevBtn').addEventListener('click', function () {
      if (lp.num && lp.num > 1) location.href = 'game.html?level=' + (lp.num - 1);
      else if (lp.raw) location.href = 'game.html?level=' + lp.raw;
      else location.href = 'game.html';
    });
  </script>
</body>
</html>
