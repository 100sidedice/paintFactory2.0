<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paint Factory — Win</title>
  <link rel="stylesheet" href="Pages/win.css">
</head>
<body>
  <div id="darken"></div>
  <canvas id="Draw" width="800" height="600"></canvas>
  <div id="win-ui">
    <h1>You Win!</h1>
    <div id="win-buttons">
      <button id="prevBtn" class="win-button">Prev</button>
      <button id="retryBtn" class="win-button">Retry</button>
      <button id="nextBtn" class="win-button">Next</button>
      <button id="levelSelectBtn" class="win-button">Level Select</button>
    </div>
  </div>

  <script>
    // Determine current level. Prefer stored value in localStorage (`pf_selectedLevel`),
    // fallback to the `?level=` URL param for compatibility.
    function parseLevel() {
      try {
        const stored = localStorage.getItem('pf_selectedLevel');
        if (stored) {
          const n = parseInt(stored, 10);
          if (!Number.isNaN(n) && String(n) === stored) return { raw: String(n), num: n };
          const m = stored.match(/^level(\d+)$/i);
          if (m) return { raw: stored, num: parseInt(m[1], 10) };
          return { raw: stored, num: null };
        }
      } catch (e) {}
      const params = new URLSearchParams(location.search);
      const raw = params.get('level');
      if (raw === null) return { raw: null, num: null };
      const n = parseInt(raw, 10);
      if (!Number.isNaN(n) && String(n) === raw) return { raw: String(n), num: n };
      const m = raw.match(/^level(\d+)$/i);
      if (m) return { raw: raw, num: parseInt(m[1], 10) };
      return { raw: raw, num: null };
    }

    const lp = parseLevel();

    document.getElementById('levelSelectBtn').addEventListener('click', function () {
      location.href = 'levelSelect.html';
    });

    document.getElementById('retryBtn').addEventListener('click', function () {
      try { if (lp.num) localStorage.setItem('pf_selectedLevel', 'level' + lp.num); else if (lp.raw) localStorage.setItem('pf_selectedLevel', lp.raw); } catch (e) {}
      location.href = 'game.html';
    });

    document.getElementById('nextBtn').addEventListener('click', function () {
      try {
        if (lp.num) localStorage.setItem('pf_selectedLevel', 'level' + (lp.num + 1));
        else if (lp.raw) localStorage.setItem('pf_selectedLevel', lp.raw);
      } catch (e) {}
      location.href = 'game.html';
    });

    document.getElementById('prevBtn').addEventListener('click', function () {
      try {
        if (lp.num && lp.num > 1) localStorage.setItem('pf_selectedLevel', 'level' + (lp.num - 1));
        else if (lp.raw) localStorage.setItem('pf_selectedLevel', lp.raw);
      } catch (e) {}
      location.href = 'game.html';
    });
  </script>
  <script type="module" src="Pages/win.js"></script>
</body>
</html>
